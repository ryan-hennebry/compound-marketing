<polyline class="edge" data-from="I" data-to="J" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="239.6805,1045.8000000000002 239.6805,1057.8000000000002 229.20266666666666,1057.8000000000002 229.20266666666666,1093.8000000000002" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
