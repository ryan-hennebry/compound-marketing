  <text x="71.63650000000004" y="414.5" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">2) Recommendation cycle</text>
</g>
<g class="subgraph" data-id="COMPOUND" data-label="3) Compounding loop">
  <rect x="40" y="846.2" width="312.23749999999995" height="300.5" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
